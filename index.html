<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReelRecs - AI-powered movie recommendations" />
    <title>ReelRecs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <h1>
        ReelRecs
        <span class="icon material-symbols-outlined" aria-hidden="true">chat_bubble</span>
      </h1>
      <form aria-label="Ask for a movie recommendation">
        <label for="query" class="sr-only">Your question</label>
        <input
          id="query"
          type="text"
          placeholder="How can I help?"
          maxlength="1000"
          required
          autocomplete="off"
        />
        <button type="submit" aria-label="Send">
          <span class="icon material-symbols-outlined" aria-hidden="true">send</span>
        </button>
      </form>
      <p class="reply" role="status" aria-live="polite"></p>
    </main>
    <script src="index.js" type="module"></script>
  </body>
</html>
